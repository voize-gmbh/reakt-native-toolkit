name: Kotlin test workflow
on: [push, pull_request]
jobs:
  build:
    name: Build
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - run: yarn install
        working-directory: js
      - run: ./gradlew build
        working-directory: kotlin
  build-example-project-kotlin:
    name: Build example project Kotlin
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - run: yarn install
        working-directory: example
      - run: yarn install
        working-directory: js
      - run: ./gradlew build
        working-directory: example/android
  build-example-project-ios:
    name: Build example project iOS
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - run: yarn install
        working-directory: example
      - run: yarn install
        working-directory: js
      - run: ./gradlew :shared:generateDummyFramework
        working-directory: example/android
      - run: pod install
        working-directory: example/ios
      - run: xcodebuild -workspace MyRNProject.xcworkspace -scheme MyRNProject -configuration Debug -sdk iphonesimulator
        working-directory: example/ios
  maven-local-publish:
    name: Publish to maven local
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - run: yarn install
        working-directory: js
      - run: ./gradlew publishToMavenLocal
        working-directory: kotlin
